{% extends "base.html" %}
{% block content %}
<section class="card">
  <div class="hero">
    <div class="emoji">🎤</div>
    <h1>Eurovision Family Vote</h1>
    <p>Ψήφισε από το κινητό σου. Βαθμολογία 1–10 σε κάθε κατηγορία.</p>
  </div>

  <form method="post" class="form">
    <label>Το όνομά σου</label>
    <input name="voter_name" placeholder="π.χ. Δημήτρης" required>

    <label>Χώρα</label>
    <select name="country" required>
      <option value="">Επίλεξε χώρα</option>
      {% for c in countries %}
        <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>

    <label>Τραγούδι</label>
    <input type="range" name="song_score" min="1" max="10" value="7" oninput="this.nextElementSibling.value=this.value">
    <output>7</output>

    <label>Σκηνική παρουσία</label>
    <input type="range" name="stage_score" min="1" max="10" value="7" oninput="this.nextElementSibling.value=this.value">
    <output>7</output>

    <label>Φωνή</label>
    <input type="range" name="voice_score" min="1" max="10" value="7" oninput="this.nextElementSibling.value=this.value">
    <output>7</output>

    <label>Τελική εντύπωση</label>
    <input type="range" name="impression_score" min="1" max="10" value="7" oninput="this.nextElementSibling.value=this.value">
    <output>7</output>

    <label>Σχόλιο προαιρετικό</label>
    <textarea name="comment" placeholder="π.χ. Καλό ρεφρέν, αδύναμη σκηνή"></textarea>

    <button type="submit">Καταχώρηση ψήφου</button>
  </form>

  <a class="link" href="{{ url_for('results') }}">Δες αποτελέσματα</a>
</section>
{% endblock %}
